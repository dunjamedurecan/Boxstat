<!DOCTYPE html>
<html>
<body>
  <script>
    const ws = new WebSocket('ws://localhost:3001'); // WebSocket URL

    ws.onopen = () => {
      console.log('WebSocket connection established');
      ws.send(JSON.stringify({
        type: 'sensor_data',
        top: { x: 1, y: 2, z: 3 },
        bottom: { x: 4, y: 5, z: 6 }
      }));
    };

    ws.onmessage = (event) => {
      console.log('Message from server:', event.data);
    };

    ws.onclose = () => {
      console.log('WebSocket connection closed');
    };

    ws.onerror = (error) => {
      console.error('WebSocket error:', error);
    };
  </script>
</body>
</html>
